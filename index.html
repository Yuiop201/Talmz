<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Talmz Single-Tone Messenger</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    button { margin: 5px; padding: 10px 20px; font-size: 16px; }
    #output { margin-top: 20px; font-size: 24px; color: #333; }
  </style>
</head>
<body>
  <h1>Talmz Single-Tone Messenger</h1>

  <div>
    <button onclick="sendText()">Send Text</button>
    <button id="start">Start Decoding</button>
  </div>

  <h2>Received Text:</h2>
  <div id="output"></div>

  <!-- Include encoder and decoder scripts -->
  <script src="encoder.js"></script>
  <script src="decoder.js"></script>
</body>
</html>
